<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAS File Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .upload-section {
            padding: 40px;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .drop-zone:hover, .drop-zone.dragover {
            background: #eef0ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .drop-zone-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .drop-zone-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .drop-zone-subtext {
            color: #666;
            font-size: 0.9em;
        }
        
        #fileInput {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
            padding: 40px;
        }
        
        .section-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        
        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .metadata-item {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .metadata-label {
            font-weight: bold;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .metadata-value {
            font-size: 1.2em;
            color: #333;
            word-break: break-word;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }
        
        tr:hover {
            background: #f8f9ff;
        }
        
        tr:nth-child(even) {
            background: #fafbff;
        }
        
        .error {
            background: #ffe6e6;
            color: #d32f2f;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            border-left: 4px solid #d32f2f;
        }
        
        .info-badge {
            background: #e3f2fd;
            color: #1976d2;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 LAS File Viewer</h1>
            <p>Загрузите LAS файл для просмотра метаинформации и данных кривых</p>
        </div>
        
        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept=".las">
                <div class="drop-zone-icon">📁</div>
                <div class="drop-zone-text">Перетащите LAS файл сюда</div>
                <div class="drop-zone-subtext">или кликните для выбора файла</div>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Обработка файла...</p>
        </div>
        
        <div class="results" id="results">
            <h2 class="section-title">📋 Метаинформация скважины</h2>
            <div class="metadata-grid" id="metadataGrid"></div>
            
            <h2 class="section-title">📈 Данные кривых</h2>
            <div class="info-badge" id="rowsInfo"></div>
            <div class="table-container">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
        
        <div id="errorContainer"></div>
    </div>
    
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const metadataGrid = document.getElementById('metadataGrid');
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const rowsInfo = document.getElementById('rowsInfo');
        const errorContainer = document.getElementById('errorContainer');
        
        // Drag and drop события
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });
        
        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFileSelect, false);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }
        
        function handleFileSelect(e) {
            const files = e.target.files;
            handleFiles(files);
        }
        
        function handleFiles(files) {
            if (files.length > 0) {
                uploadFile(files[0]);
            }
        }
        
        function uploadFile(file) {
            // Скрываем предыдущие результаты и ошибки
            results.style.display = 'none';
            errorContainer.innerHTML = '';
            
            // Показываем индикатор загрузки
            loading.style.display = 'block';
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';
                
                if (data.error) {
                    showError(data.error);
                } else {
                    displayResults(data);
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                showError('Ошибка соединения: ' + error.message);
            });
        }
        
        function showError(message) {
            errorContainer.innerHTML = `
                <div class="error">
                    <strong>Ошибка:</strong> ${message}
                </div>
            `;
        }
        
        function displayResults(data) {
            // Отображаем метаинформацию
            const metadataItems = [
                { label: 'Скважина', value: data.metadata.well_name },
                { label: 'Месторождение', value: data.metadata.field },
                { label: 'Локация', value: data.metadata.location },
                { label: 'Провинция/Регион', value: data.metadata.province },
                { label: 'Округ', value: data.metadata.county },
                { label: 'Штат', value: data.metadata.state },
                { label: 'Страна', value: data.metadata.country },
                { label: 'Сервисная компания', value: data.metadata.service_company },
                { label: 'Дата', value: data.metadata.date },
                { label: 'API номер', value: data.metadata.api },
                { label: 'Номер запуска', value: data.metadata.run_number },
                { label: 'Версия LAS', value: data.metadata.version }
            ];
            
            metadataGrid.innerHTML = metadataItems.map(item => `
                <div class="metadata-item">
                    <div class="metadata-label">${item.label}</div>
                    <div class="metadata-value">${item.value || 'Не указано'}</div>
                </div>
            `).join('');
            
            // Отображаем таблицу данных
            if (data.table_headers && data.table_headers.length > 0) {
                // Заголовки таблицы
                tableHead.innerHTML = '<tr>' + 
                    data.table_headers.map(header => `<th>${header}</th>`).join('') + 
                    '</tr>';
                
                // Строки таблицы
                tableBody.innerHTML = data.table_data.map(row => 
                    '<tr>' + 
                    data.table_headers.map(header => {
                        const value = row[header];
                        const displayValue = value !== null && value !== undefined ? 
                            (typeof value === 'number' ? value.toFixed(4) : value) : '-';
                        return `<td>${displayValue}</td>`;
                    }).join('') + 
                    '</tr>'
                ).join('');
                
                // Информация о строках
                rowsInfo.textContent = `Показано ${data.displayed_rows} из ${data.total_rows} строк`;
            }
            
            // Показываем результаты
            results.style.display = 'block';
        }
    </script>
</body>
</html>
